services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.13
    environment:
      - node.name=index
      - cluster.name=opensanctions-index
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      restart_policy:
        condition: on-failure

  yente:
    image: ghcr.io/opensanctions/yente:5.4.0
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      YENTE_INDEX_TYPE: "elasticsearch"
      YENTE_INDEX_URL: http://elasticsearch:9200
      YENTE_MANIFEST: /app/manifests/civic.yml
      OPENSANCTIONS_DELIVERY_TOKEN: ${OPENSANCTIONS_DELIVERY_TOKEN}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      yente:
        condition: service_healthy
    environment:
      YENTE_BASE_URL: http://yente:8000
      YENTE_API_KEY: ${YENTE_API_KEY:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  es_data:
